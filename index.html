<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>3-4岁幼儿潜力深度测评 - 专业增强版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #FF7675;
            --secondary: #74B9FF;
            --success: #00B894;
            --text-main: #2D3436;
            --text-sub: #636E72;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; user-select: none; }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(160deg, #F9FAFB 0%, #FFF5F5 100%);
            margin: 0; padding: 15px; color: var(--text-main); line-height: 1.6;
        }

        /* 验证界面 */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary); z-index: 99999;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-box {
            background: white; padding: 40px 30px; border-radius: 35px;
            width: 90%; max-width: 360px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .auth-box h2 { color: var(--primary); margin: 0; font-size: 24px; font-weight: 800; }
        .auth-box input {
            width: 100%; padding: 16px; border: 2px solid #F1F2F6; border-radius: 18px;
            margin: 30px 0; font-size: 22px; text-align: center; outline: none;
            transition: all 0.3s; background: #F8F9FA; letter-spacing: 4px;
        }
        .auth-box button {
            width: 100%; padding: 18px; background: var(--primary); color: white;
            border: none; border-radius: 18px; font-size: 18px; font-weight: bold;
            cursor: pointer; box-shadow: 0 10px 15px -3px rgba(255,118,117,0.4);
        }

        /* 主体布局 */
        #main-content {
            display: none; max-width: 680px; margin: auto;
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 { color: var(--primary); font-size: 28px; margin: 0; letter-spacing: -0.5px; }
        .badge { display: inline-block; padding: 4px 12px; background: rgba(255,118,117,0.1); color: var(--primary); border-radius: 8px; font-size: 12px; margin-top: 10px; font-weight: 600; }

        /* 题目设计 */
        .question { margin-bottom: 25px; padding: 25px; border-radius: 28px; background: white; border: 1px solid #F1F2F6; }
        .question p { font-weight: 700; margin-bottom: 18px; font-size: 17px; color: #333; }
        .options label {
            display: block; margin: 12px 0; padding: 16px 20px;
            border: 1.5px solid #F1F2F6; border-radius: 16px;
            font-size: 15px; cursor: pointer; transition: all 0.2s; position: relative;
        }
        input[type="radio"] { display: none; }
        .options label:has(input:checked) { border-color: var(--primary); background: #FFF9F9; box-shadow: 0 4px 12px rgba(255,118,117,0.08); }
        input[type="radio"]:checked + span { color: var(--primary); font-weight: 600; }

        .btn-submit {
            width: 100%; padding: 22px; background: linear-gradient(135deg, #FF7675, #FF9F9E);
            color: white; border: none; border-radius: 24px; font-size: 20px;
            font-weight: 800; cursor: pointer; margin-top: 30px;
            box-shadow: 0 15px 30px rgba(255,118,117,0.3);
        }

        /* 报告优化 */
        #report { display: none; margin-top: 50px; animation: fadeIn 0.8s ease; }
        .report-card { background: white; border-radius: 30px; padding: 30px; margin-bottom: 25px; border: 1px solid #F1F2F6; }
        .res-headline { text-align: center; }
        .res-headline h2 { font-size: 32px; color: var(--primary); margin: 10px 0; }
        
        .section-title { 
            display: flex; align-items: center; font-size: 18px; font-weight: 800; 
            margin-bottom: 20px; color: #2D3436; 
        }
        .section-title::before { content: ""; width: 6px; height: 20px; background: var(--primary); border-radius: 3px; margin-right: 12px; }

        /* 雷达图放大优化 */
        .radar-box { height: 480px; width: 100%; margin: 10px auto; position: relative; }

        /* 天赋分级模块 */
        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
        .level-card { 
            padding: 15px; border-radius: 20px; background: #F8F9FA; 
            border: 1px solid #F1F2F6; display: flex; flex-direction: column;
        }
        .lvl-title { font-size: 14px; color: var(--text-sub); font-weight: 600; margin-bottom: 6px; }
        .lvl-status { font-size: 13px; font-weight: 800; display: inline-block; padding: 2px 8px; border-radius: 6px; width: fit-content; }
        .lvl-best { background: #E3FCEF; color: #00B894; }
        .lvl-potential { background: #E3F2FD; color: #0984E3; }
        .lvl-normal { background: #F1F2F6; color: #B2BEC3; }

        .analysis-text { color: var(--text-sub); font-size: 15px; line-height: 1.8; text-align: justify; }
        .tag-p { background: rgba(255,118,117,0.1); color: var(--primary); padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; margin: 2px; }
        .advice-item { background: #F8FBFF; padding: 15px; border-radius: 15px; margin-bottom: 12px; font-size: 14px; border-left: 4px solid var(--secondary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

                "<b>【精密手工】</b>：进行粘土、木工小件制作，磨炼精细动作的耐受力。",
                "<b>【情境演绎】</b>：在学习新知识时，鼓励通过肢体动作来加深记忆。"
            ]
        },
        interpersonal: {
            title: "社交洞察者 (Interpersonal)",
            tags: ["共情专家", "领袖特质", "冲突管理"],
            desc: "您的孩子是天生的社交枢纽。他们拥有卓越的非语言信号读取能力，能瞬间识别他人的需求并给出反馈。这种‘高情商’特质在未来的管理、公共服务、心理咨询等领域将成为其核心竞争力。他们善于调配资源，通过谈判和共情来实现群体目标，具备很强的说服力。",
            advice: [
                "<b>【模拟社交】</b>：通过角色扮演练习复杂的社交场景（如拒绝、求助、分享）。",
                "<b>【群体活动】</b>：鼓励参与具有竞争与合作性质的小组活动，观察并引导其领导行为。",
                "<b>【情感教育】</b>：帮助孩子命名复杂的社会情绪，提升其共情层次。"
            ]
        }
    };

    window.generateReport = function() {
        const sel = document.querySelectorAll('input[type="radio"]:checked');
        if(sel.length < 30) { alert(`测评还差 ${30-sel.length} 题。`); return; }
        
        let s = { linguistic:0, logical:0, spatial:0, musical:0, kinesthetic:0, interpersonal:0 };
        sel.forEach(r => s[r.value]++);
        
        const top = Object.keys(s).sort((a,b) => s[b]-s[a])[0];
        const res = dict[top];

        document.getElementById('res-title').innerText = res.title;
        document.getElementById('res-desc').innerText = res.desc;
        
        
        const tagBox = document.getElementById('res-tags');
        tagBox.innerHTML = res.tags.map(t => `<span class="tag-p">${t}</span>`).join('');

        
        const advBox = document.getElementById('res-advice');
        advBox.innerHTML = res.advice.map(a => `<div class="advice-item">${a}</div>`).join('');

        
        renderLevelList(s);
        
        renderCharts(s);

        document.getElementById('report').style.display = 'block';
        window.scrollTo({ top: document.getElementById('report').offsetTop - 20, behavior: 'smooth' });
    };

    function renderLevelList(scores) {
        const container = document.getElementById('level-list');
        const names = {
            linguistic: '语言表达', logical: '数理逻辑', spatial: '空间视觉',
            musical: '音乐律动', kinesthetic: '肢体运动', interpersonal: '人际社交'
        };
        container.innerHTML = '';
        Object.keys(scores).forEach(key => {
            const val = scores[key];
            let levelClass = 'lvl-normal', levelText = '一般水平';
            if(val >= 8) { levelClass = 'lvl-best'; levelText = '天赋极佳'; }
            else if(val >= 5) { levelClass = 'lvl-potential'; levelText = '较有潜力'; }

            const div = document.createElement('div');
            div.className = 'level-card';
            div.innerHTML = `
                <span class="lvl-title">${names[key]}</span>
                <span class="lvl-status ${levelClass}">${levelText}</span>
            `;
            container.appendChild(div);
        });
    }

    function renderCharts(s) {
        const labels = ['语言表达', '数理逻辑', '空间视觉', '音乐律动', '肢体运动', '人际社交'];
        const values = [s.linguistic, s.logical, s.spatial, s.musical, s.kinesthetic, s.interpersonal];
        
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: 'rgba(255, 118, 117, 0.25)',
                    borderColor: '#FF7675',
                    borderWidth: 4,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#FF7675',
                    pointBorderWidth: 3,
                    pointRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        min: 0, max: 12,
                        beginAtZero: true,
                        ticks: { stepSize: 2, display: false },
                        grid: { color: 'rgba(0,0,0,0.06)', lineWidth: 1 },
                        angleLines: { color: 'rgba(0,0,0,0.06)' },
                        pointLabels: { 
                            font: { size: 16, weight: '800' }, 
                            color: '#2D3436',
                            padding: 15
                        }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }
})();
</script>
</body>
</html>
